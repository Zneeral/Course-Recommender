<!DOCTYPE html>
<html>
<head>
<title>Admin Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app">

<div class="sidebar">
<h2>Admin Panel</h2>
<a href="admin.html">Dashboard</a>
<a href="#" onclick="logout()">Logout</a>
</div>

<div class="content">

<div class="page-header">
<h1>System Analytics</h1>
</div>

<div class="card">
<h3>Total Students</h3>
<h2 id="total"></h2>
</div>

<div class="card">
<h3>Personality Distribution</h3>
<div id="traits"></div>
</div>

</div>
</div>

<script>

let students=JSON.parse(localStorage.getItem("students"))||[];

document.getElementById("total").innerText=students.length;

let traits={R:0,I:0,A:0,S:0,E:0,C:0};

students.forEach(s=>{

if(s.riasec){

for(let t in s.riasec){
traits[t]+=s.riasec[t];
}

}

});

document.getElementById("traits").innerHTML=JSON.stringify(traits);

</script>

</body>
</html>
