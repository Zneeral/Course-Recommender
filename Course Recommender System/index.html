<!DOCTYPE html>
<html>
<head>
<title>CourseMatch - Login</title>
<link rel="stylesheet" href="style.css">
</head>
<body class="auth-page">

<div class="wrapper">

<!-- Left Section -->   
<div class="left">
    <h1>CourseMatch</h1>
    <p>
        Intelligent course recommendation system designed to help students
        choose the right college program based on their interests,
        personality, and strengths.
    </p>
</div>

<!-- Right Section -->
<div class="right">
    <div class="form-box">

        <div class="form-title">Student Login</div>
        <div class="form-sub">Access your career dashboard</div>

        <div class="input-group">
            <span>📧</span>
            <input id="email" placeholder="Email">
        </div>

        <div class="input-group">
            <span>🔒</span>
            <input id="password" type="password" placeholder="Password">
        </div>

        <button onclick="login()">Login</button>

        <div class="links">
            <p>No account? <a href="register.html">Register</a></p>
            <p><a href="admin-login.html">Admin Login</a></p>
        </div>

    </div>
</div>

</div>

<script src="script.js"></script>
</body>
</html>
